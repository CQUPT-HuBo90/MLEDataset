[workspace]
authors = ["AQA"]
channels = ["conda-forge"]
name = "AQA"
platforms = ["linux-64", "win-64"]
version = "0.1.0"

[tasks]
test = { cmd = ["python", "test_ensemble.py"] }

[dependencies]
python = "3.10.*"
pixi-pycharm = ">=0.0.10,<0.0.11"

[pypi-dependencies]
numpy = "==1.24.3"
scipy = "==1.10.1"
pillow = "==10.4.0"
open-clip-torch = "==2.32.0"

[feature.cuda.dependencies]
cuda-toolkit = ">=12.1,<12.2"
cudnn = ">=8,<9"

[feature.cuda.pypi-dependencies]
torch = { version = "==2.4.1", index = "https://download.pytorch.org/whl/cu121" }
torchvision = { version = "==0.19.1", index = "https://download.pytorch.org/whl/cu121" }

[feature.cpu.pypi-dependencies]
torch = { version = "==2.4.1", index = "https://download.pytorch.org/whl/cpu" }
torchvision = { version = "==0.19.1", index = "https://download.pytorch.org/whl/cpu" }

[environments]
cuda = { features = ["cuda"] }
default = { features = ["cpu"] }
