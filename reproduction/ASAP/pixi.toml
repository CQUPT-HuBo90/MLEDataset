[workspace]
authors = ["ASAP"]
channels = ["conda-forge"]
name = "ASAP"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
install = { cmd = ["pip", "install", "flash-attn==2.7.2.post1", "--no-build-isolation"] }

test = { cmd = ["bash", "scripts/run_xgb_from_results.sh"], depends-on = ["install"] }
test_full = { cmd = ["bash", "scripts/run_full_repro.sh"], depends-on = ["install"] }

[dependencies]
python = "3.9.*"
pixi-pycharm = ">=0.0.10,<0.0.11"

[pypi-options]
no-build-isolation = true

